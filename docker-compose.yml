# ABYSSAL — local development with Docker
#
# Quick start (Supabase CLI on host + app in Docker):
#   npm run docker:up
#
# App only (cloud Supabase or custom .env.docker):
#   cp .env.docker.example .env.docker
#   docker compose up --build
#
# Production preview build:
#   docker compose --profile preview up --build app-preview

name: sonar-deep-dives

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - "${APP_PORT:-5173}:5173"
    env_file:
      - path: .env.docker
        required: false
      - path: .env
        required: false
    environment:
      # Browser uses localhost; SSR uses host gateway (see .env.docker.example)
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true

  app-preview:
    profiles: [preview]
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:54321}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    ports:
      - "${PREVIEW_PORT:-4173}:4173"
    env_file:
      - path: .env.docker
        required: false
      - path: .env
        required: false
    environment:
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:54321}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  app_node_modules:
